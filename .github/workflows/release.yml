name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: rustop

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-24.04
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          - target: aarch64-apple-darwin
            os: macos-14
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Install Rust stable
        run: |
          rustup update stable
          rustup default stable
          rustup target add ${{ matrix.target }}

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package
        id: pkg
        env:
          TARGET: ${{ matrix.target }}
          REF_NAME: ${{ inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          staging="${BIN_NAME}-${REF_NAME}-${TARGET}"
          mkdir "$staging"
          cp "target/${TARGET}/release/${BIN_NAME}" "$staging/"
          cp LICENSE README.md "$staging/" 2>/dev/null || true
          tar -czf "${staging}.tar.gz" "$staging"
          shasum -a 256 "${staging}.tar.gz" > "${staging}.tar.gz.sha256"
          echo "archive=${staging}.tar.gz" >> "$GITHUB_OUTPUT"
          echo "checksum=${staging}.tar.gz.sha256" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.target }}
          path: |
            ${{ steps.pkg.outputs.archive }}
            ${{ steps.pkg.outputs.checksum }}
          if-no-files-found: error

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true

      - uses: step-security/action-gh-release@dc29ef0d1f6f9a032a97ec797d9cb7ea788dde41 # v2.6.1
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: |
            dist/*.tar.gz
            dist/*.sha256
          fail_on_unmatched_files: true
          generate_release_notes: true
